name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    if: github.repository == 'yca-software/design-system'
    runs-on: ubuntu-latest
    environment: github
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI checks
        run: pnpm run ci

      - name: Publish to npm
        run: npm publish --provenance --access public
